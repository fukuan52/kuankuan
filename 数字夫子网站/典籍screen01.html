<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字夫子 · 典籍3D书架</title>
    <!-- Font Awesome (原3D书籍使用) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font (原3D书籍使用) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400&display=swap">
    <!-- jQuery (导航框依赖) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <style>
        /* ========== 原3d书籍.html 样式 (保留完整) ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            background: #2a2a2a; 
            background-size: cover;
            background-position: center;
            overflow: hidden;
            transition: background-image .7s ease-in-out;
            font-family: 'Source Sans Pro', sans-serif;
        }

        .shell {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: rgba(99, 99, 99, 0.5);
            backdrop-filter: blur(3px);
        }

        .shell_body {
            width: 100%;
            padding: 20px 15px 0;
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .shell_slider {
            position: relative;
            height: auto;
            transition: transform 1s ease-in-out;
            background: transparent;
            will-change: transform;
        }

        .item {
            position: relative;
            float: left;
            margin: 0 20px;
            list-style: none;
            transition: transform 0.3s;
            will-change: transform;
            cursor: pointer;  /* 鼠标指针表示可点击 */
        }

        .frame {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 1s ease-in-out;
            transform-style: preserve-3d;
            border-radius: 4px 12px 12px 4px;
        }

        .frame::after {
            content: "";
            position: absolute;
            bottom: -16%;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0px 0px 15px 5px rgba(255, 255, 255, 0.4);
            transform: rotateX(90deg) translate3d(0px, -20px, 0px);
            border-radius: 50%;
            filter: blur(4px);
            pointer-events: none;
        }

        .box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid #333;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            backface-visibility: hidden;
            background-size: cover;
            background-position: center;
            text-shadow: 0 0 15px currentColor;
            color: #fff;
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
        }

        .front {
            transform: translateZ(40px);
            background-blend-mode: overlay;
            border-radius: 4px 12px 12px 4px;
            background-color: #fff;
            color: #333;
        }

        .left {
            transform: translate3d(-40px, 0, 0) rotateY(-90deg);
            transform-origin: 0% 50%;
            width: 40px;
            border-radius: 4px 0 0 4px;
            background-color: #333;
            color: #fff;
            padding: 10px 5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .right {
            transform: translate3d(1px, 0, -40px) rotateY(90deg);
            transform-origin: 100% 50%;
            border-radius: 0 4px 4px 0;
            background-color: #f0f0f0;
            color: #333;
        }

        .front h1 {
            font-size: 24px;
            font-weight: 900;
            text-shadow: none;
            line-height: 1.2;
            transform: translateZ(20px);
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .front span {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: 300;
            text-shadow: none;
            transform: translateZ(20px);
            color: #fff;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
            width: fit-content;
            margin: 0 auto;
            border-radius: 20px;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .left span {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 16px;
            font-weight: bold;
            transform: rotate(180deg);
        }

        .button {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 350px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 120px;
            z-index: 100;
        }

        .prev, .next {
            transition: transform 0.25s ease, opacity 0.3s;
            z-index: 99999;
            cursor: pointer;
            opacity: 0.8;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .prev:hover, .next:hover {
            transform: scale(1.1);
            opacity: 1;
            background: rgba(0,0,0,0.6);
        }

        .prev i, .next i {
            font-size: 60px;
            color: #fff;
            text-shadow: 0 0 10px #ffffff;
            transition: 0.2s;
        }

        .item--active .frame {
            filter: drop-shadow(0 0 25px rgba(255,215,0,0.8));
        }

        .shell_slider::after {
            content: "";
            display: table;
            clear: both;
        }

        body {
            background-color: #1a1a2e;
        }

        /* ===== 固定顶部琉璃导航 (与登录.html完全一致) ===== */
        #nav {
            position: fixed;
            top: 16px;
            left: 20px;
            right: 20px;
            margin: 0 auto;
            padding: 8px 25px;
            background: rgba(255, 248, 240, 0.2);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 48px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.15) inset;
            display: flex;
            list-style: none;
            z-index: 999;
            justify-content: flex-start;
            align-items: center;
            transition: background 0.3s;
            box-sizing: border-box;
        }

        #nav li a {
            position: relative;
            padding: 12px 28px;
            font: 500 22px '楷体', 'KaiTi', '优设标题黑', sans-serif;
            border: none;
            outline: none;
            color: white;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            display: inline-block;
            text-decoration: none;
            z-index: 3;
            white-space: nowrap;
            transition: color 0.2s;
            letter-spacing: 2px;
        }

        #nav li a:hover {
            color: #fff8e7;
            text-shadow: 0 0 12px #ffffffcc;
        }

        /* 两个滑动背景块 */
        .slide1, .slide2 {
            position: absolute;
            display: inline-block;
            height: 52px;
            border-radius: 40px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1.05);
            pointer-events: none;
        }

        .slide1 {
            background: rgba(230, 210, 180, 0.5);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            z-index: 2;
        }

        .slide2 {
            opacity: 0;
            background: rgba(245, 235, 210, 0.4);
            box-shadow: 0 0 25px rgba(255, 250, 240, 0.8) inset;
            z-index: 1;
            transition: opacity 0.3s, left 0.5s, width 0.5s, transform 0.3s;
        }

        .squeeze {
            transform: scale(0.92);
        }

        /* 响应式调整 */
        @media (max-width: 700px) {
            #nav li a { padding: 10px 18px; font-size: 18px; }
            .slide1, .slide2 { height: 46px; }
        }
    </style>
</head>
<body>
    <!-- 固定导航栏 (统一链接) -->
    <ul id="nav">
        <li class="slide1"></li>
        <li class="slide2"></li>
        <li><a href="index.html">首页</a></li>
        <li><a href="先贤.html">先贤</a></li>
        <li><a href="典籍screen01.html">典籍</a></li>
        <li><a href="留言.html">留言</a></li>
        <li><a href="登录.html">登录</a></li>
    </ul>

    <!-- 3D书籍主体 -->
    <div class="shell">
        <div class="shell_body">
            <div class="button">
                <div class="prev"><i class="fas fa-arrow-left"></i></div>
                <div class="next"><i class="fas fa-arrow-right"></i></div>
            </div>

            <div class="shell_slider">
                <!-- 本草纲目 -->
                <div class="item">
                    <div class="frame">
                        <div class="box front">
                            <h1>本草纲目</h1>
                            <span>李时珍 - 中国古代药学巨著</span>
                        </div>
                        <div class="box left"><span>本草纲目</span></div>
                        <div class="box right"></div>
                    </div>
                </div>
                <!-- 论语 -->
                <div class="item">
                    <div class="frame">
                        <div class="box front">
                            <h1>论语</h1>
                            <span>孔子及其弟子 - 儒家经典</span>
                        </div>
                        <div class="box left"><span>论语</span></div>
                        <div class="box right"></div>
                    </div>
                </div>
                <!-- 史记 -->
                <div class="item">
                    <div class="frame">
                        <div class="box front">
                            <h1>史记</h1>
                            <span>司马迁 - 中国第一部纪传体通史</span>
                        </div>
                        <div class="box left"><span>史记</span></div>
                        <div class="box right"></div>
                    </div>
                </div>
                <!-- 天工开物 -->
                <div class="item">
                    <div class="frame">
                        <div class="box front">
                            <h1>天工开物</h1>
                            <span>宋应星 - 中国古代科技百科全书</span>
                        </div>
                        <div class="box left"><span>天工开物</span></div>
                        <div class="box right"></div>
                    </div>
                </div>
                <!-- 徐霞客游记 -->
                <div class="item">
                    <div class="frame">
                        <div class="box front">
                            <h1>徐霞客游记</h1>
                            <span>徐霞客 - 中国古代地理学名著</span>
                        </div>
                        <div class="box left"><span>徐霞客游记</span></div>
                        <div class="box right"></div>
                    </div>
                </div>
                <!-- 周易 -->
                <div class="item">
                    <div class="frame">
                        <div class="box front">
                            <h1>周易</h1>
                            <span>中国古代哲学经典</span>
                        </div>
                        <div class="box left"><span>周易</span></div>
                        <div class="box right"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 原3D书籍的JavaScript (保留并添加点击跳转) -->
    <script>
    (function() {
        "use strict";

        const shell = document.querySelector('.shell');
        const slider = shell.querySelector('.shell_slider');
        const items = shell.querySelectorAll('.item');
        const prevBtn = shell.querySelector('.prev');
        const nextBtn = shell.querySelector('.next');

        let width, height, totalWidth;
        const margin = 20;
        let currIndex = 0;
        let interval = null;
        const intervalTime = 4000;

        function setItemBackgrounds() {
            const bookCovers = [
                '本草纲目.jpg',
                '论语.jpg',
                '史记.jpg',
                '天工开物.jpg',
                '徐霞客游记.jpg',
                '周易.jpg'
            ];
            
            items.forEach((item, idx) => {
                const frame = item.querySelector('.frame');
                if (!frame) return;
                const front = frame.querySelector('.front');
                const left = frame.querySelector('.left');
                const right = frame.querySelector('.right');
                const coverImage = bookCovers[idx % bookCovers.length];
                
                if (front) {
                    front.style.background = `url('images/${coverImage}') no-repeat center center`;
                    front.style.backgroundSize = 'cover';
                }
                if (left) {
                    left.style.background = `url('images/${coverImage}') no-repeat center center`;
                    left.style.backgroundSize = 'cover';
                    left.style.filter = 'brightness(0.7) saturate(1.2)';
                }
                if (right) {
                    right.style.background = `url('images/${coverImage}') no-repeat center center`;
                    right.style.backgroundSize = 'cover';
                }
            });
        }

        function resize() {
            width = Math.max(window.innerWidth * 0.2, 275);
            height = window.innerHeight * 0.6;
            totalWidth = width * items.length;

            slider.style.width = totalWidth + 'px';
            slider.style.height = height + 'px';

            items.forEach(item => {
                item.style.width = (width - (margin * 2)) + 'px';
                item.style.height = height + 'px';
            });

            if (currIndex >= 1 && currIndex <= items.length) {
                move(currIndex, true);
            }
        }

        function move(index, silent = false) {
            if (index < 1) index = items.length;
            if (index > items.length) index = 1;
            currIndex = index;

            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                const frame = item.querySelector('.frame');
                if (!frame) continue;

                if (i === (currIndex - 1)) {
                    item.classList.add('item--active');
                    frame.style.transform = 'perspective(1500px) rotateY(0deg) translateZ(50px)';
                } else {
                    item.classList.remove('item--active');
                    const angle = (i < currIndex - 1) ? -50 : 50;
                    const translateZ = (i < currIndex - 1) ? -100 : -100;
                    frame.style.transform = `perspective(1500px) rotateY(${angle}deg) translateZ(${translateZ}px)`;
                }
            }

            const offsetX = (currIndex * -width) + (width / 2) + (window.innerWidth / 2);
            slider.style.transform = `translate3d(${offsetX}px, 0, 0)`;

            const activeItem = items[currIndex - 1];
            if (activeItem) {
                const frontBox = activeItem.querySelector('.front');
                if (frontBox) {
                    const bg = window.getComputedStyle(frontBox).background;
                    document.body.style.background = bg;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                }
            }

            if (!silent) {
                resetTimer();
            }
        }

        function prev() {
            move(currIndex - 1);
        }

        function next() {
            move(currIndex + 1);
        }

        function resetTimer() {
            if (interval) clearInterval(interval);
            interval = setInterval(() => {
                next();
            }, intervalTime);
        }

        // 新增：点击书籍跳转到详情页（典籍screen02.html）并定位到对应锚点
        function bindClickToItems() {
            const idMap = {
                '本草纲目': 'book-bencaogangmu',
                '论语': 'book-lunyu',
                '史记': 'book-shiji',
                '天工开物': 'book-tiangongkaiwu',
                '徐霞客游记': 'book-xuxiake',
                '周易': 'book-zhouyi'
            };
            items.forEach(item => {
                item.addEventListener('click', function(e) {
                    const titleElem = this.querySelector('.front h1');
                    if (!titleElem) return;
                    const bookName = titleElem.textContent.trim();
                    const bookId = idMap[bookName];
                    if (bookId) {
                        // 跳转到典籍screen02.html，并附带锚点
                        window.location.href = '典籍screen02.html#' + bookId;
                    } else {
                        console.warn('未找到对应的书籍ID', bookName);
                    }
                });
            });
        }

        function bindEvents() {
            window.addEventListener('resize', () => {
                resize();
            });

            prevBtn.addEventListener('click', prev);
            nextBtn.addEventListener('click', next);

            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    prev();
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    next();
                }
            });
        }

        function init() {
            setItemBackgrounds();
            resize();
            const startIndex = Math.floor(items.length / 2) + 1;
            move(startIndex, true);
            bindEvents();
            resetTimer();
            bindClickToItems(); // 绑定点击跳转
        }

        init();
    })();
    </script>

    <!-- ===== 导航交互脚本 (高亮“典籍”) ===== -->
    <script>
        $(function() {
            var $nav = $('#nav');
            var $slide1 = $nav.find('.slide1');
            var $slide2 = $nav.find('.slide2');

            function placeSlider($slider, $targetLi) {
                if (!$targetLi.length) return;
                var pos = $targetLi.position();
                var w = $targetLi.width();
                $slider.css({ left: pos.left, width: w, top: pos.top });
            }

            // 高亮“典籍”
            var $dianjiLi = $nav.find('li a:contains("典籍")').parent();
            if ($dianjiLi.length) placeSlider($slide1, $dianjiLi);

            // 点击移动滑块并允许跳转
            $nav.find('a').on('click', function(e) {
                var $parentLi = $(this).parent();
                placeSlider($slide1, $parentLi);
                // 不阻止默认，让href跳转
            });

            // 悬停效果
            $nav.find('a').on('mouseenter', function() {
                var $parentLi = $(this).parent();
                placeSlider($slide2, $parentLi);
                $slide2.css({ opacity: 1 }).addClass('squeeze');
            }).on('mouseleave', function() {
                $slide2.css({ opacity: 0 }).removeClass('squeeze');
            });

            $(window).on('resize', function() {
                var $dianjiLi = $nav.find('li a:contains("典籍")').parent();
                if ($dianjiLi.length) placeSlider($slide1, $dianjiLi);
            });
        });
    </script>
</body>
</html>
