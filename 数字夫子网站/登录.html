<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录界面 · 光束之眼 · 典籍风格导航</title>
    
    <!-- jQuery (导航框依赖) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>

    <style>
        /* ===== 登录页面原始样式 (光束之眼) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bgColor: white;
            --border: black;
            --inputColor: black;
            --outlineColor: rgb(60, 115, 235);
            --beamDegrees: 0deg;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: var(--bgColor);
            font-family: '优设标题黑', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: background-color 0.2s;
            /* 增加顶部留空，避免固定导航遮挡表单 (导航高约80px) */
            padding-top: 80px;
        }

        body.show-password {
            --bgColor: rgba(0, 0, 0, 0.9);
            --inputColor: white;
            --border: rgb(255, 255, 255);
        }

        .shell {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 导航固定在上方，表单依然居中 */
        }

        form {
            transform: translate3d(0, 0, 0);
            padding: 3em 5em;
            border: 0.2em solid var(--border);
            border-radius: 1em;
            box-shadow: 1em 1em 1em 1em #00000065;
            background-color: transparent;
        }

        form > * + * {
            margin-top: 15px;
        }

        .form-item > * + * {
            margin-top: 0.5rem;
        }

        h2, label, input, button {
            font-size: 1.5rem;
            font-family: inherit;
            color: var(--inputColor);
        }

        h2 {
            font-size: 3rem;
            margin: 0 0 0.5rem 0;
            text-align: center;
            letter-spacing: 2px;
        }

        label:focus, input:focus, button:focus {
            outline-offset: 2px;
        }

        label::-moz-focus-inner, input::-moz-focus-inner, button::-moz-focus-inner {
            border: none;
        }

        button {
            border: none;
            background: transparent;
        }

        #submit {
            cursor: pointer;
            width: 100%;
            margin: 20px 0 2px;
            padding: 0.75rem 1.25rem;
            color: var(--bgColor);
            background-color: var(--inputColor);
            box-shadow: 4px 4px 0 rgba(30, 144, 255, 0.2);
            font-size: 1.8rem;
            transition: transform 0.1s;
        }

        #submit:active {
            transform: translateY(1px);
        }

        .input-wrapper {
            position: relative;
        }

        input {
            padding: 0.75rem 4rem 0.75rem 0.75rem;
            width: 100%;
            border: 2px solid transparent;
            border-radius: 0;
            background-color: transparent;
            box-shadow: inset 0 0 2px black,
                        inset 6px 6px 0 rgba(30, 144, 255, 0.2),
                        3px 3px 0 rgba(30, 144, 255, 0.2);
            -webkit-appearance: none;
            appearance: none;
            font-size: 1.5rem;
        }

        input:focus {
            outline-offset: 1px;
            outline: 2px solid var(--outlineColor);
        }

        .show-password input {
            box-shadow: inset 0 0 2px black;
            border: 2px dashed white;
        }

        .show-password input:focus {
            outline: none;
            border-color: rgb(255, 255, 145);
        }

        #eyeball {
            --size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none;
            position: absolute;
            top: 50%;
            right: 0.75rem;
            border: none;
            background-color: transparent;
            transform: translateY(-50%);
            padding: 0;
            z-index: 5;
        }

        #eyeball:active {
            transform: translateY(calc(-50% + 1px));
        }

        .eye {
            width: var(--size);
            height: var(--size);
            border: 2px solid var(--inputColor);
            border-radius: calc(var(--size) / 1.5) 0;
            transform: rotate(45deg);
            position: relative;
        }

        .eye:before,
        .eye:after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            margin: auto;
            border-radius: 100%;
        }

        .eye:before {
            width: 35%;
            height: 35%;
            background-color: var(--inputColor);
        }

        .eye:after {
            width: 65%;
            height: 65%;
            border: 2px solid var(--inputColor);
            border-radius: 100%;
            background: transparent;
        }

        #beam {
            position: absolute;
            top: 50%;
            right: 1.75rem;
            clip-path: polygon(100% 50%, 100% 50%, 0 0, 0 100%);
            width: 100vw;
            height: 25vw;
            z-index: 1;
            mix-blend-mode: multiply;
            transition: transform 200ms ease-out;
            transform-origin: 100% 50%;
            transform: translateY(-50%) rotate(var(--beamDegrees, 0deg));
            pointer-events: none;
            background: rgba(0, 0, 0, 0.7);
        }

        .show-password #beam {
            background: rgb(255, 255, 145);
        }

        .form-item {
            margin-bottom: 1.2rem;
        }

        .button {
            margin-top: 1rem;
        }

        .show-password .eye:before,
        .show-password .eye:after {
            border-color: white;
        }
        .show-password .eye:before {
            background-color: white;
        }

        /* ===== 固定顶部琉璃导航 (与登录.html完全一致) ===== */
        #nav {
            position: fixed;
            top: 16px;
            left: 20px;
            right: 20px;
            margin: 0 auto;
            padding: 8px 25px;
            background: rgba(255, 248, 240, 0.2);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 48px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.15) inset;
            display: flex;
            list-style: none;
            z-index: 999;
            justify-content: flex-start;
            align-items: center;
            transition: background 0.3s;
            box-sizing: border-box;
        }

        #nav li a {
            position: relative;
            padding: 12px 28px;
            font: 500 22px '楷体', 'KaiTi', '优设标题黑', sans-serif;
            border: none;
            outline: none;
            color: white;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            display: inline-block;
            text-decoration: none;
            z-index: 3;
            white-space: nowrap;
            transition: color 0.2s;
            letter-spacing: 2px;
        }

        #nav li a:hover {
            color: #fff8e7;
            text-shadow: 0 0 12px #ffffffcc;
        }

        /* 两个滑动背景块 */
        .slide1, .slide2 {
            position: absolute;
            display: inline-block;
            height: 52px;
            border-radius: 40px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1.05);
            pointer-events: none;
        }

        .slide1 {
            background: rgba(230, 210, 180, 0.5);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            z-index: 2;
        }

        .slide2 {
            opacity: 0;
            background: rgba(245, 235, 210, 0.4);
            box-shadow: 0 0 25px rgba(255, 250, 240, 0.8) inset;
            z-index: 1;
            transition: opacity 0.3s, left 0.5s, width 0.5s, transform 0.3s;
        }

        .squeeze {
            transform: scale(0.92);
        }

        /* 响应式调整 */
        @media (max-width: 700px) {
            #nav li a { padding: 10px 18px; font-size: 18px; }
            .slide1, .slide2 { height: 46px; }
        }

        /* 深色模式下导航文字颜色微调 (适应背景变暗) */
        .show-password #nav li a {
            color: #e0e8ff;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <!-- ===== 导航栏 (典籍风格，固定顶部，统一链接) ===== -->
    <ul id="nav">
        <li class="slide1"></li>
        <li class="slide2"></li>
        <li><a href="index.html">首页</a></li>
        <li><a href="先贤.html">先贤</a></li>
        <li><a href="典籍screen01.html">典籍</a></li>
        <li><a href="留言.html">留言</a></li>
        <li><a href="登录.html">登录</a></li>
    </ul>

    <!-- ===== 登录表单主体 (光束之眼) ===== -->
    <div class="shell">
        <form>
            <h2>LOGIN</h2>

            <div class="form-item">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="输入用户名">
                </div>
            </div>

            <div class="form-item">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="密码">
                    <button type="button" id="eyeball" aria-label="显示/隐藏密码">
                        <div class="eye"></div>
                    </button>
                    <div id="beam"></div>
                </div>
            </div>

            <div class="button">
                <button type="submit" id="submit">Sign in</button>
            </div>
        </form>
    </div>

    <!-- ===== 光束眼睛交互 (修复版，使用jQuery) ===== -->
    <script>
        $(function() {
            const $body = $('body');
            const $password = $('#password');
            const $beam = $('#beam');
            const $eyeball = $('#eyeball');

            // 初始隐藏光束
            $beam.hide();

            $eyeball.on('click', function(e) {
                e.preventDefault();

                // 切换密码类型
                const isPassword = $password.attr('type') === 'password';
                $password.attr('type', isPassword ? 'text' : 'password');

                // 切换 body 类（控制整体主题色）
                $body.toggleClass('show-password');

                // 控制光束显示
                if (isPassword) {
                    $beam.show();
                    // 设置光束角度（如果需要动态旋转，可在此修改）
                    document.documentElement.style.setProperty('--beamDegrees', '0deg');
                } else {
                    $beam.hide();
                }

                // 让密码框保持焦点（可选）
                $password.focus();
            });

            // 表单提交跳转到首页（添加验证）
            $('form').on('submit', function(e) {
                e.preventDefault();
                const username = $('#username').val().trim();
                const password = $('#password').val().trim();
                
                if (!username || !password) {
                    alert('请输入账号和密码');
                    return;
                }
                
                window.location.href = 'index.html';
            });
        });
    </script>

    <!-- ===== 导航交互脚本 (高亮“登录”) ===== -->
    <script>
        $(function() {
            var $nav = $('#nav');
            var $slide1 = $nav.find('.slide1');
            var $slide2 = $nav.find('.slide2');

            function placeSlider($slider, $targetLi) {
                if (!$targetLi.length) return;
                var pos = $targetLi.position();
                var w = $targetLi.width();
                $slider.css({ left: pos.left, width: w, top: pos.top });
            }

            // 高亮“登录”
            var $loginLi = $nav.find('li a:contains("登录")').parent();
            if ($loginLi.length) placeSlider($slide1, $loginLi);

            // 点击移动滑块并允许跳转
            $nav.find('a').on('click', function(e) {
                var $parentLi = $(this).parent();
                placeSlider($slide1, $parentLi);
                // 不阻止默认，让href跳转
            });

            // 悬停效果
            $nav.find('a').on('mouseenter', function() {
                var $parentLi = $(this).parent();
                placeSlider($slide2, $parentLi);
                $slide2.css({ opacity: 1 }).addClass('squeeze');
            }).on('mouseleave', function() {
                $slide2.css({ opacity: 0 }).removeClass('squeeze');
            });

            $(window).on('resize', function() {
                var $loginLi = $nav.find('li a:contains("登录")').parent();
                if ($loginLi.length) placeSlider($slide1, $loginLi);
            });
        });
    </script>
</body>
</html>
